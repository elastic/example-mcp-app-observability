name: Track Clone Count

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and merge clone and download data
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          API_DATA=$(gh api /repos/${{ github.repository }}/traffic/clones)
          EXISTING=$(cat clone-counts.json)

          EXISTING_DATES=$(echo "$EXISTING" | jq '[.days[].date]')

          NEW_DAYS=$(echo "$API_DATA" | jq --argjson known "$EXISTING_DATES" '
            .clones | map({
              date: (.timestamp | split("T")[0]),
              count: .count,
              uniques: .uniques
            }) | map(select(.date as $d | $known | index($d) == null))
          ')

          NEW_CLONE_COUNT=$(echo "$NEW_DAYS" | jq 'length')
          NEW_CLONE_TOTAL=$(echo "$NEW_DAYS" | jq 'if length > 0 then [.[].count] | add else 0 end')

          DOWNLOADS=$(gh api /repos/${{ github.repository }}/releases | jq '
            [.[] | .assets[] | select(
              .name == "example-mcp-app-observability.mcpb" or
              .name == "example-mcp-app-observability.tgz"
            ) | .download_count] | add // 0
          ')

          echo "$EXISTING" | jq \
            --argjson new_days "$NEW_DAYS" \
            --argjson new_clone_total "$NEW_CLONE_TOTAL" \
            --argjson downloads "$DOWNLOADS" '
            .total += $new_clone_total |
            .downloads = $downloads |
            .days += $new_days |
            .days |= sort_by(.date)
          ' > clone-counts.json

          echo "Added $NEW_CLONE_COUNT new clone day(s), +$NEW_CLONE_TOTAL clones, $DOWNLOADS total downloads"

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet clone-counts.json || (
            git add clone-counts.json &&
            git commit -m "chore: update clone counts [skip ci]" &&
            git push
          )
